<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratoterra — Geopolitical Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/responsive.css">
  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- D3.js (for relation explorer) -->
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <h1 class="logo">Stratoterra</h1>
      </div>
      <div class="header-center">
        <div style="position:relative">
          <input type="text" id="search" placeholder="Search country..." autocomplete="off" />
          <div class="search-dropdown" id="search-dropdown"></div>
        </div>
      </div>
      <div class="header-right">
        <nav id="main-nav">
          <a href="#map" class="nav-link active" data-view="map">Map</a>
          <a href="#briefing" class="nav-link" data-view="briefing">Briefing</a>
          <a href="#alerts" class="nav-link" data-view="alerts">Alerts</a>
          <a href="#rankings" class="nav-link" data-view="rankings">Rankings</a>
          <a href="#relations" class="nav-link" data-view="relations">Relations</a>
          <a href="#compare" class="nav-link" data-view="compare">Compare</a>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <div id="map-container"></div>
      <div id="country-panel" class="panel hidden"></div>

      <!-- Additional view containers -->
      <div id="briefing-view" class="view-container"></div>
      <div id="alerts-view" class="view-container"></div>
      <div id="rankings-view" class="view-container"></div>
      <div id="relations-view" class="view-container"></div>
      <div id="compare-view" class="view-container"></div>
    </main>

    <footer id="bottom-bar">
      <div class="metric-selector">
        <label>Color by:</label>
        <select id="metric-select">
          <option value="gdp_growth_trend">GDP Growth</option>
          <option value="political_stability">Political Stability</option>
          <option value="investment_risk">Investment Risk</option>
          <option value="military_spending_trend">Military Spend Trend</option>
          <option value="alert_severity">Alert Severity</option>
          <option value="economic_complexity">Economic Complexity</option>
          <option value="energy_independence">Energy Independence</option>
          <option value="trade_openness">Trade Openness</option>
        </select>
      </div>
      <div class="overlay-selector">
        <label>Overlay:</label>
        <select id="overlay-select">
          <option value="none">None</option>
          <option value="EU">EU</option>
          <option value="NATO">NATO</option>
          <option value="BRICS">BRICS</option>
          <option value="ASEAN">ASEAN</option>
          <option value="OPEC">OPEC</option>
          <option value="G7">G7</option>
          <option value="G20">G20</option>
        </select>
      </div>
      <div class="last-updated">
        Last updated: <span id="last-updated-date">—</span>
      </div>
    </footer>
  </div>

  <div id="disclaimer">
    AI-generated geopolitical analysis for informational purposes only.
    Not financial advice. <a href="#methodology">Methodology</a>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/map-view.js"></script>
  <script src="js/country-panel.js"></script>
  <script src="js/search.js"></script>
  <script src="js/briefing-view.js"></script>
  <script src="js/alert-dashboard.js"></script>
  <script src="js/rankings-view.js"></script>
  <script src="js/relation-explorer.js"></script>
  <script src="js/comparison-tool.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
