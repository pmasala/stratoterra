<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratoterra — Geopolitical Intelligence</title>
  <link rel="stylesheet" href="css/main.css">
  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <h1 class="logo">Stratoterra</h1>
      </div>
      <div class="header-center">
        <input type="text" id="search" placeholder="Search country..." />
      </div>
      <div class="header-right">
        <nav id="main-nav">
          <a href="#map" class="nav-link active">🌍 Map</a>
          <a href="#briefing" class="nav-link">📋 Briefing</a>
          <a href="#alerts" class="nav-link">⚠️ Alerts</a>
          <a href="#rankings" class="nav-link">📊 Rankings</a>
          <a href="#relations" class="nav-link">🔗 Relations</a>
          <a href="#compare" class="nav-link">⚖️ Compare</a>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <div id="map-container"></div>
      <div id="country-panel" class="panel hidden"></div>
    </main>

    <footer id="bottom-bar">
      <div class="metric-selector">
        <label>Color by:</label>
        <select id="metric-select">
          <option value="gdp_growth_trend">GDP Growth Trend</option>
          <option value="political_stability">Political Stability</option>
          <option value="investment_risk">Investment Risk</option>
          <option value="military_spending_trend">Military Spending Trend</option>
          <option value="alert_severity">Alert Severity</option>
          <option value="economic_complexity">Economic Complexity</option>
          <option value="energy_independence">Energy Independence</option>
        </select>
      </div>
      <div class="overlay-selector">
        <label>Overlay:</label>
        <select id="overlay-select">
          <option value="none">None</option>
          <option value="EU">EU</option>
          <option value="NATO">NATO</option>
          <option value="BRICS">BRICS</option>
          <option value="ASEAN">ASEAN</option>
          <option value="OPEC">OPEC</option>
          <option value="G7">G7</option>
          <option value="G20">G20</option>
        </select>
      </div>
      <div class="last-updated">
        Last updated: <span id="last-updated-date">—</span>
      </div>
    </footer>
  </div>

  <div id="disclaimer">
    AI-generated geopolitical analysis for informational purposes only.
    Not financial advice. <a href="#methodology">Methodology</a>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/map-view.js"></script>
  <script src="js/country-panel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
